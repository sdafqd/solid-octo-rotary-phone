<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G Scripts</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050d05;
            --surface: rgba(10, 22, 10, 0.85);
            --border: rgba(80, 200, 80, 0.18);
            --border-bright: rgba(80, 200, 80, 0.45);
            --green-dim: #1e5c1e;
            --green: #3ddc3d;
            --green-bright: #7eff7e;
            --green-glow: rgba(61, 220, 61, 0.25);
            --text: #c8ffc8;
            --text-dim: #4a7a4a;
            --red: #ff3c3c;
            --blue: #5865F2;
            --tg: #0099e6;
            --mono: 'Space Mono', monospace;
            --display: 'Syne', sans-serif;
        }

        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--mono);
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #networkCanvas {
            position: fixed;
            inset: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(61,220,61,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(61,220,61,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow {
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(61,220,61,0.08) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            animation: breathe 6s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        .container {
            max-width: 480px;
            width: 100%;
            position: relative;
            z-index: 1;
            max-height: 95vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding: 4px;
        }

        .container::-webkit-scrollbar { display: none; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow:
                0 0 0 1px rgba(61,220,61,0.05) inset,
                0 32px 64px rgba(0,0,0,0.7),
                0 0 60px rgba(61,220,61,0.04);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            position: relative;
        }

        .header::before {
            content: '';
            display: block;
            width: 40px; height: 2px;
            background: var(--green);
            margin: 0 auto 16px;
            box-shadow: 0 0 12px var(--green);
        }

        .title {
            font-family: var(--display);
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--green-bright);
            letter-spacing: -1px;
            line-height: 1;
            text-shadow:
                0 0 20px rgba(126,255,126,0.5),
                0 0 60px rgba(61,220,61,0.2);
            animation: titlePulse 4s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 20px rgba(126,255,126,0.5), 0 0 60px rgba(61,220,61,0.2); }
            50% { text-shadow: 0 0 30px rgba(126,255,126,0.8), 0 0 80px rgba(61,220,61,0.35); }
        }

        .subtitle {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .tasks-area {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        .tasks-area::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
            opacity: 0.4;
        }

        .progress-wrap {
            margin-bottom: 16px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .progress-label {
            font-size: 0.6rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .progress-count {
            font-size: 0.7rem;
            color: var(--green);
            font-weight: 700;
        }

        .progress-track {
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
            height: 4px;
            border: 1px solid rgba(61,220,61,0.1);
            overflow: visible;
            position: relative;
        }

        .progress-bar {
            background: var(--green);
            height: 100%;
            border-radius: 4px;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            box-shadow: 0 0 10px var(--green);
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            right: -2px; top: -3px;
            width: 10px; height: 10px;
            background: var(--green-bright);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--green);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .progress-bar[style*="width: 0%"]::after { opacity: 0; }
        .progress-bar:not([style*="width: 0%"])::after { opacity: 1; }

        .task-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            padding: 13px 14px;
            border-radius: 12px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            font-family: var(--mono);
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            color: white;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
            letter-spacing: 0.5px;
        }

        .task-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0.08), transparent);
            pointer-events: none;
        }

        .task-btn:last-child { margin-bottom: 0; }

        .task-btn:active:not(.processing):not(.completed):not(.blocked) {
            transform: translateY(2px) scale(0.99);
        }

        .task-btn .icon {
            width: 32px; height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .task-btn .icon svg {
            width: 18px; height: 18px;
            fill: white;
        }

        .task-btn span { flex: 1; text-align: left; }

        .task-btn .arrow {
            width: 20px; height: 20px;
            opacity: 0.4;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.2s;
        }

        .task-btn:hover:not(.completed):not(.blocked):not(.processing) .arrow {
            opacity: 0.8;
            transform: translateX(2px);
        }

        .task-btn.youtube {
            background: linear-gradient(135deg, #c8001a, #ff0000);
            box-shadow: 0 4px 20px rgba(255,0,0,0.2), 0 1px 0 rgba(255,255,255,0.1) inset;
        }
        .task-btn.discord {
            background: linear-gradient(135deg, #3d4ddb, #5865F2);
            box-shadow: 0 4px 20px rgba(88,101,242,0.2), 0 1px 0 rgba(255,255,255,0.1) inset;
        }
        .task-btn.telegram {
            background: linear-gradient(135deg, #006bb3, #0099e6);
            box-shadow: 0 4px 20px rgba(0,153,230,0.2), 0 1px 0 rgba(255,255,255,0.1) inset;
        }
        .task-btn.tiktok {
            background: linear-gradient(135deg, #111, #2a2a2a);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.08) inset;
            border-color: rgba(255,255,255,0.08);
        }

        .task-btn.processing { pointer-events: none; opacity: 0.8; }
        .task-btn.youtube.processing { animation: pulse-red 1.5s ease-in-out infinite; }
        .task-btn.discord.processing { animation: pulse-blue 1.5s ease-in-out infinite; }
        .task-btn.telegram.processing { animation: pulse-tg 1.5s ease-in-out infinite; }
        .task-btn.tiktok.processing { animation: pulse-dark 1.5s ease-in-out infinite; }

        @keyframes pulse-red {
            0%,100% { box-shadow: 0 4px 20px rgba(255,0,0,0.2); }
            50% { box-shadow: 0 4px 35px rgba(255,0,0,0.55); }
        }
        @keyframes pulse-blue {
            0%,100% { box-shadow: 0 4px 20px rgba(88,101,242,0.2); }
            50% { box-shadow: 0 4px 35px rgba(88,101,242,0.55); }
        }
        @keyframes pulse-tg {
            0%,100% { box-shadow: 0 4px 20px rgba(0,153,230,0.2); }
            50% { box-shadow: 0 4px 35px rgba(0,153,230,0.55); }
        }
        @keyframes pulse-dark {
            0%,100% { box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
            50% { box-shadow: 0 4px 35px rgba(100,100,100,0.3); }
        }

        .task-btn.completed {
            opacity: 0.35;
            pointer-events: none;
            filter: grayscale(0.5);
        }

        .task-btn.completed .task-text { text-decoration: line-through; }

        .task-btn.blocked {
            opacity: 0.25;
            pointer-events: none;
            filter: grayscale(1);
        }

        .task-btn.processing .task-text { display: none; }
        .task-btn.processing .processing-text { display: flex !important; align-items: center; gap: 6px; }
        .processing-text { display: none; }

        .processing-dots {
            display: inline-flex;
            gap: 3px;
        }

        .processing-dots span {
            width: 4px; height: 4px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            animation: dot-bounce 1.2s ease-in-out infinite;
        }

        .processing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .processing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dot-bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        .task-btn.completed .arrow { display: none; }
        .check-icon { display: none; }
        .task-btn.completed .check-icon {
            display: flex;
            width: 20px; height: 20px;
            flex-shrink: 0;
            opacity: 0.7;
        }

        .script-area {
            background: rgba(0,0,0,0.35);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border-bright);
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            animation: fadeSlideIn 0.4s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 0 40px rgba(61,220,61,0.08);
        }

        .script-area.hidden { display: none; }

        .script-area::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--green-bright), transparent);
            opacity: 0.6;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .script-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-dim);
            font-size: 0.6rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .script-label::before,
        .script-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        pre {
            background: rgba(0,0,0,0.5);
            color: var(--green-bright);
            padding: 14px 16px;
            border-radius: 10px;
            font-family: var(--mono);
            font-size: 0.8rem;
            border: 1px solid rgba(61,220,61,0.12);
            white-space: pre-wrap;
            word-break: break-all;
            margin-bottom: 14px;
            line-height: 1.6;
            text-shadow: 0 0 8px rgba(126,255,126,0.3);
        }

        .copy-btn {
            width: 100%;
            background: linear-gradient(135deg, #1e5c1e, #2e8a2e);
            border: 1px solid rgba(61,220,61,0.3);
            color: var(--green-bright);
            font-weight: 700;
            font-size: 0.85rem;
            font-family: var(--mono);
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 4px 20px rgba(61,220,61,0.1), 0 1px 0 rgba(126,255,126,0.15) inset;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            position: relative;
            overflow: hidden;
        }

        .copy-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0.07), transparent);
        }

        .copy-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 10px rgba(61,220,61,0.1);
        }

        .copy-btn.copied {
            background: linear-gradient(135deg, #1a5c1a, #22802a);
            color: #ffffff;
            border-color: rgba(61,220,61,0.5);
            box-shadow: 0 4px 20px rgba(61,220,61,0.25), 0 0 30px rgba(61,220,61,0.1);
        }

        .loading, .error {
            text-align: center;
            padding: 24px;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .loading {
            color: var(--green);
            animation: blink 1.2s step-end infinite;
        }

        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .error { color: var(--red); }

        .footer {
            text-align: center;
            margin-top: 16px;
            font-size: 0.6rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @media (max-width: 400px) {
            .title { font-size: 2.2rem; }
            .task-btn { padding: 11px 12px; }
            .copy-btn { font-size: 0.78rem; }
        }
    </style>
</head>

    <script>
        (function() {
            const canvas = document.getElementById('networkCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            const COUNT = 50;
            const MAX_DIST = 130;
            let points = [];

            function init() {
                points = [];
                for (let i = 0; i < COUNT; i++) {
                    points.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: (Math.random() - 0.5) * 0.5
                    });
                }
            }

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                init();
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);
                for (let p of points) {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > width) { p.vx *= -1; p.x = Math.max(0, Math.min(width, p.x)); }
                    if (p.y < 0 || p.y > height) { p.vy *= -1; p.y = Math.max(0, Math.min(height, p.y)); }
                }
                for (let i = 0; i < points.length; i++) {
                    for (let j = i + 1; j < points.length; j++) {
                        const dx = points[i].x - points[j].x;
                        const dy = points[i].y - points[j].y;
                        const d = Math.sqrt(dx*dx + dy*dy);
                        if (d < MAX_DIST) {
                            const a = 0.25 * (1 - d / MAX_DIST);
                            ctx.beginPath();
                            ctx.strokeStyle = `rgba(61,220,61,${a})`;
                            ctx.lineWidth = 0.8;
                            ctx.moveTo(points[i].x, points[i].y);
                            ctx.lineTo(points[j].x, points[j].y);
                            ctx.stroke();
                        }
                    }
                }
                for (let p of points) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(126,255,126,0.6)';
                    ctx.fill();
                }
                requestAnimationFrame(draw);
            }

            window.addEventListener('resize', resize);
            resize();
            draw();
        })();
    </script>

                    youtube: '<svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>',
                    discord: '<svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0c-.164-.386-.398-.875-.608-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128c.126-.094.252-.192.373-.291a.074.074 0 0 1 .077-.01c1.642.75 3.387 1.13 5.146 1.13c1.759 0 3.504-.38 5.146-1.13a.074.074 0 0 1 .078.01c.12.099.247.197.373.291a.077.077 0 0 1-.008.128c-.588.36-1.215.66-1.872.892a.076.076 0 0 0-.041.106c.352.699.764 1.364 1.226 1.994a.078.078 0 0 0 .084.028c2.108-.591 4.004-1.62 5.993-3.03a.082.082 0 0 0 .031-.057c.42-4.477-.434-9.011-3.544-13.66a.07.07 0 0 0-.032-.027zM8.524 14.036c-1.167 0-2.115-1.051-2.115-2.347c0-1.296.928-2.347 2.115-2.347c1.187 0 2.135 1.051 2.115 2.347c0 1.296-.928 2.347-2.115 2.347zm6.952 0c-1.167 0-2.115-1.051-2.115-2.347c0-1.296.928-2.347 2.115-2.347s2.135 1.051 2.115 2.347c0 1.296-.928 2.347-2.115 2.347z"/></svg>',
                    telegram: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.13-.08-.18-.09-.05-.22-.03-.32-.01-.14.02-2.37 1.5-3.28 2.08-.31.2-.59.3-.84.3-.28 0-.81-.16-1.21-.29-.49-.16-.88-.25-.85-.53.02-.15.22-.3.62-.46 2.43-1.06 4.05-1.76 4.86-2.09 2.31-.95 2.79-1.11 3.1-1.12.07 0 .18.02.26.08.06.05.1.12.11.21.01.07 0 .16-.02.25z"/></svg>',
                    tiktok: '<svg viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v3.03c-1.49-.05-2.97-.38-4.27-1.03-.48-.24-.94-.54-1.36-.88v7.18c0 4.27-3.47 7.74-7.74 7.74-2.27 0-4.36-.99-5.78-2.56-.98-.98-1.6-2.24-1.76-3.62-.06-.45-.09-.91-.09-1.37 0-4.27 3.47-7.74 7.74-7.74.27 0 .54.02.81.05v3.03c-.27-.04-.54-.07-.81-.07-2.61 0-4.73 2.12-4.73 4.73 0 1.23.47 2.35 1.24 3.19.69.76 1.62 1.23 2.65 1.3 1.03.07 2.02-.24 2.82-.87.82-.64 1.35-1.57 1.43-2.61.04-.23.06-.46.06-.7V.02h.01z"/></svg>'
                };
                return icons[platform] || icons.youtube;
            }

            const arrowSvg = `<svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`;
            const checkSvg = `<svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="#3ddc3d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

            function createTaskElement(task) {
                const btn = document.createElement('div');
                btn.className = `task-btn ${task.platform}`;
                btn.id = `task${task.id}`;
                const link = processYouTubeLink(task.link, task.platform);
                btn.dataset.url = link;
                btn.dataset.schema = task.schema;
                btn.innerHTML = `
                    <div class="icon">${getIconSvg(task.platform)}</div>
                    <span class="task-text">${task.description}</span>
                    <span class="processing-text">Verifying<span class="processing-dots"><span></span><span></span><span></span></span></span>
                    ${checkSvg}
                    ${arrowSvg}
                `;
                return btn;
            }

            function openAppOrBrowser(url, appScheme) {
                const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
                if (isMobile && appScheme) {
                    window.location.href = appScheme + url.replace(/^https?:\/\//, '');
                    setTimeout(() => window.open(url, '_blank'), 800);
                } else {
                    window.open(url, '_blank');
                }
            }

            function getRandomTime() {
                return Math.floor(Math.random() * (20000 - 8000 + 1)) + 8000;
            }

            function checkExpiry() {
                try {
                    const t = localStorage.getItem(EXPIRY_KEY);
                    if (t && Date.now() > parseInt(t)) {
                        [STORAGE_KEY, TIMES_KEY, EXPIRY_KEY].forEach(k => localStorage.removeItem(k));
                        location.reload();
                        return true;
                    }
                } catch(e) {}
                return false;
            }

            function updateProgress() {
                const pct = (completedCount / totalTasks) * 100;
                const bar = document.getElementById('progressBar');
                const cnt = document.getElementById('progressCount');
                if (bar) bar.style.width = pct + '%';
                if (cnt) cnt.textContent = completedCount + '/' + totalTasks;
            }

            function blockOtherTasks(currentId, list) {
                list.forEach(t => {
                    if (t.id !== currentId) {
                        const b = document.getElementById('task' + t.id);
                        if (b && !b.classList.contains('completed')) b.classList.add('blocked');
                    }
                });
            }

            function unblockTasks(list) {
                list.forEach(t => {
                    const b = document.getElementById('task' + t.id);
                    if (b) b.classList.remove('blocked');
                });
            }

            function completeTask(btn, taskId, list) {
                btn.dataset.status = 'completed';
                btn.classList.remove('processing');
                btn.classList.add('completed');
                completedCount++;
                updateProgress();
                const completed = list.map(t => document.getElementById('task'+t.id)).filter(b => b && b.classList.contains('completed')).map((_, i) => list[i].id);
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(list.filter(t => document.getElementById('task'+t.id)?.classList.contains('completed')).map(t => t.id)));
                    const times = JSON.parse(localStorage.getItem(TIMES_KEY) || '{}');
                    delete times[taskId]; delete times[taskId + '_duration'];
                    localStorage.setItem(TIMES_KEY, JSON.stringify(times));
                    if (completedCount === totalTasks) localStorage.setItem(EXPIRY_KEY, (Date.now() + ACCESS_DURATION).toString());
                } catch(e) {}
                isProcessing = false;
                unblockTasks(list);
                activeTimeout = null;
                if (completedCount === totalTasks) {
                    document.getElementById('tasksArea').style.display = 'none';
                    scriptArea.classList.remove('hidden');
                }
            }

            function loadProgress(list) {
                if (checkExpiry()) return;
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const done = JSON.parse(saved);
                        completedCount = done.length;
                        list.forEach(t => {
                            const b = document.getElementById('task'+t.id);
                            if (b && done.includes(t.id)) { b.classList.add('completed'); b.dataset.status = 'completed'; }
                        });
                        if (completedCount === totalTasks) {
                            document.getElementById('tasksArea').style.display = 'none';
                            scriptArea.classList.remove('hidden');
                        }
                    }
                    const times = localStorage.getItem(TIMES_KEY);
                    if (times) {
                        const tt = JSON.parse(times);
                        const now = Date.now();
                        list.forEach(t => {
                            const b = document.getElementById('task'+t.id);
                            if (b && tt[t.id] && !b.classList.contains('completed')) {
                                const elapsed = now - tt[t.id];
                                const remaining = tt[t.id+'_duration'] - elapsed;
                                if (remaining > 0) {
                                    isProcessing = true;
                                    b.dataset.status = 'processing';
                                    b.classList.add('processing');
                                    blockOtherTasks(t.id, list);
                                    activeTimeout = setTimeout(() => completeTask(b, t.id, list), remaining);
                                } else {
                                    completeTask(b, t.id, list);
                                }
                            }
                        });
                    }
                } catch(e) {}
                updateProgress();
            }

            function initTaskLogic(list) {
                list.forEach(task => {
                    const btn = document.getElementById('task'+task.id);
                    if (!btn) return;
                    btn.addEventListener('click', function() {
                        if (this.dataset.status === 'processing' || this.dataset.status === 'completed' || isProcessing) return;
                        openAppOrBrowser(this.dataset.url, this.dataset.schema);
                        const dur = getRandomTime();
                        try {
                            const times = JSON.parse(localStorage.getItem(TIMES_KEY) || '{}');
                            times[task.id] = Date.now();
                            times[task.id+'_duration'] = dur;
                            localStorage.setItem(TIMES_KEY, JSON.stringify(times));
                        } catch(e) {}
                        isProcessing = true;
                        this.dataset.status = 'processing';
                        this.classList.add('processing');
                        blockOtherTasks(task.id, list);
                        if (activeTimeout) clearTimeout(activeTimeout);
                        activeTimeout = setTimeout(() => completeTask(btn, task.id, list), dur);
                    });
                });
            }

            function renderTasks(list) {
                const area = document.createElement('div');
                area.className = 'tasks-area';
                area.id = 'tasksArea';
                area.innerHTML = `
                    <div class="progress-wrap">
                        <div class="progress-header">
                            <span class="progress-label">Progress</span>
                            <span class="progress-count" id="progressCount">0/${list.length}</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-bar" id="progressBar"></div>
                        </div>
                    </div>
                `;
                list.forEach(t => area.appendChild(createTaskElement(t)));
                tasksContainer.innerHTML = '';
                tasksContainer.appendChild(area);
                totalTasks = list.length;
                completedCount = 0;
                initTaskLogic(list);
                loadProgress(list);
            }

            function showDirect() {
                tasksContainer.innerHTML = '';
                scriptContent.textContent = SCRIPT_DIRECT;
                scriptArea.classList.remove('hidden');
            }

            function loadOnline() {
                tasksContainer.innerHTML = '<div class="loading">// loading missions...</div>';
                fetch(ONLINE_URL + '?t=' + Date.now())
                    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
                    .then(cfg => {
                        if (cfg.missions?.length) {
                            if (cfg.code) scriptContent.textContent = cfg.code;
                            renderTasks(cfg.missions);
                        } else throw new Error();
                    })
                    .catch(() => {
                        tasksContainer.innerHTML = '<div class="error">// failed to load missions</div>';
                        scriptContent.textContent = SCRIPT_DIRECT;
                        scriptArea.classList.remove('hidden');
                    });
            }

            if (copyBtn) {
                copyBtn.addEventListener('click', function() {
                    navigator.clipboard.writeText(scriptContent.innerText);
                    this.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> copied!`;
                    this.classList.add('copied');
                    setTimeout(() => {
                        this.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> copy script`;
                        this.classList.remove('copied');
                    }, 1500);
                });
            }

            if (MODE === "direct") showDirect();
            else if (MODE === "online") loadOnline();
            else {
                scriptContent.textContent = SCRIPT_HTML;
                renderTasks(MISSIONS_HTML);
            }
        })();
    </script>
</body>
</html>
