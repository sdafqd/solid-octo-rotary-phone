<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G Scripts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0e2a0e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #networkCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.6;
            pointer-events: none;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: #1c331c;
            border-radius: 24px;
            border: 1px solid #3a6d3a;
            padding: 20px;
            box-shadow: 0 8px 0 #0a1a0a;
            max-height: 95vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(2px);
        }

        .container::-webkit-scrollbar {
            display: none;
        }
        
        .container {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #dcffdc;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
            line-height: 1;
            text-align: center;
            text-shadow: 0 0 10px #7fff7f;
        }

        .tasks-area {
            background: #0f1f0f;
            border-radius: 18px;
            padding: 16px;
            border: 1px solid #4b874b;
            margin-bottom: 20px;
        }

        .progress-container {
            background: #0a130a;
            border-radius: 30px;
            padding: 3px;
            margin-bottom: 15px;
            border: 1px solid #3f773f;
        }

        .progress-bar {
            background: linear-gradient(90deg, #3d8a3d, #5faf5f);
            height: 20px;
            border-radius: 30px;
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            color: #b8f8b8;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 15px;
            text-shadow: 0 0 5px #7fff7f;
            font-weight: 600;
        }

        .task-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 1rem;
            font-weight: 600;
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            color: white;
            cursor: pointer;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .task-btn:active:not(.processing):not(.completed):not(.blocked) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.3);
        }

        .task-btn:last-child {
            margin-bottom: 0;
        }

        .task-btn .icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .task-btn .icon svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .task-btn span {
            flex: 1;
            text-align: left;
            font-size: 0.95rem;
        }

        .task-btn.youtube { background: linear-gradient(145deg, #ff0000, #cc0000); }
        .task-btn.discord { background: linear-gradient(145deg, #5865F2, #4752c4); }
        .task-btn.telegram { background: linear-gradient(145deg, #0088cc, #006699); }
        .task-btn.tiktok { background: linear-gradient(145deg, #000000, #222222); }

        .task-btn.youtube.processing { background: linear-gradient(145deg, #ff3333, #cc0000); animation: pulse-red 1.5s infinite; pointer-events: none; opacity: 0.8; }
        .task-btn.discord.processing { background: linear-gradient(145deg, #7983f5, #4752c4); animation: pulse-blue 1.5s infinite; pointer-events: none; opacity: 0.8; }
        .task-btn.telegram.processing { background: linear-gradient(145deg, #33ccff, #006699); animation: pulse-blue 1.5s infinite; pointer-events: none; opacity: 0.8; }
        .task-btn.tiktok.processing { background: linear-gradient(145deg, #444444, #111111); animation: pulse-black 1.5s infinite; pointer-events: none; opacity: 0.8; }

        .task-btn.completed {
            opacity: 0.5;
            background: #2a4f2a;
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.3);
            pointer-events: none;
            border-color: #3f773f;
        }

        .task-btn.completed.youtube { background: #661111; }
        .task-btn.completed.discord { background: #2a2f66; }
        .task-btn.completed.telegram { background: #004466; }
        .task-btn.completed.tiktok { background: #1a1a1a; }

        .task-btn.blocked {
            opacity: 0.5;
            pointer-events: none;
            background: #1f331f;
        }

        .task-btn.processing .task-text { display: none; }
        .task-btn.processing .processing-text { display: inline !important; color: rgba(255, 255, 255, 0.9); }
        .processing-text { display: none; }

        @keyframes pulse-red {
            0% { box-shadow: 0 4px 0 #990000, 0 0 10px #ff0000; }
            50% { box-shadow: 0 4px 0 #990000, 0 0 30px #ff6666; }
            100% { box-shadow: 0 4px 0 #990000, 0 0 10px #ff0000; }
        }

        @keyframes pulse-blue {
            0% { box-shadow: 0 4px 0 #2a2f66, 0 0 10px #5865F2; }
            50% { box-shadow: 0 4px 0 #2a2f66, 0 0 30px #8c96f7; }
            100% { box-shadow: 0 4px 0 #2a2f66, 0 0 10px #5865F2; }
        }

        @keyframes pulse-black {
            0% { box-shadow: 0 4px 0 #111111, 0 0 10px #333333; }
            50% { box-shadow: 0 4px 0 #111111, 0 0 30px #666666; }
            100% { box-shadow: 0 4px 0 #111111, 0 0 10px #333333; }
        }

        .script-area {
            background: #0f1f0f;
            border-radius: 18px;
            padding: 16px;
            border: 1px solid #4b874b;
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease-in-out;
            box-shadow: inset 0 0 20px rgba(75, 135, 75, 0.3);
        }

        .script-area.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .script-label {
            color: #b8f8b8;
            font-size: 0.8rem;
            margin-bottom: 10px;
            opacity: 0.9;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #7fff7f;
        }

        pre {
            background: #0a130a;
            color: #b0f0b0;
            padding: 16px;
            border-radius: 12px;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            font-size: 0.9rem;
            border: 1px solid #3f773f;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-bottom: 16px;
            box-shadow: inset 0 0 15px rgba(75, 135, 75, 0.3);
        }

        button {
            width: 100%;
            background: linear-gradient(145deg, #3d8a3d, #2e6a2e);
            border: none;
            color: #ffffff;
            font-weight: 700;
            font-size: 1.3rem;
            padding: 16px;
            border-radius: 16px;
            border-bottom: 4px solid #1e4a1e;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            box-shadow: 0 4px 0 #0f2a0f, 0 0 0 1px #4f9f4f inset;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            font-family: inherit;
            line-height: 1;
        }

        button:active {
            transform: translateY(3px);
            border-bottom-width: 2px;
            box-shadow: 0 1px 0 #0f2a0f, 0 0 0 1px #5faf5f inset;
        }

        button.copied {
            background: linear-gradient(145deg, #2e8b57, #228b22);
            border-bottom-color: #1a4d1a;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .loading {
            color: #b0f0b0;
            text-align: center;
            padding: 20px;
            font-size: 1.2rem;
            text-shadow: 0 0 10px #7fff7f;
        }

        .error {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
            font-size: 1.2rem;
            text-shadow: 0 0 10px #ff0000;
        }

        @media (max-width: 400px) {
            .container { padding: 16px; }
            .title { font-size: 2rem; }
            .task-btn { padding: 12px; }
            .task-btn span { font-size: 0.9rem; }
            .task-btn .icon svg { width: 22px; height: 22px; }
            button { font-size: 1.2rem; padding: 14px; }
        }
    </style>
</head>
<body>
    <canvas id="networkCanvas"></canvas>
    
    <div class="container">
        <div class="title">G Scripts</div>
        <div id="tasksContainer"></div>
        <div class="script-area hidden" id="scriptArea">
            <div class="script-label">main script</div>
            <pre id="scriptContent"></pre>
            <button id="copyBtn">copy script</button>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('networkCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            const COUNT = 70;
            const MAX_DIST = 150;
            const SPEED = 0.4;
            let points = [];

            function initPoints() {
                points = [];
                for (let i = 0; i < COUNT; i++) {
                    points.push({ x: Math.random() * width, y: Math.random() * height, vx: (Math.random() - 0.5) * SPEED * 2, vy: (Math.random() - 0.5) * SPEED * 2 });
                }
            }

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initPoints();
            }

            function updatePoints() {
                for (let point of points) {
                    point.x += point.vx;
                    point.y += point.vy;
                    if (point.x < 0 || point.x > width) { point.vx *= -1; point.x = Math.max(0, Math.min(width, point.x)); }
                    if (point.y < 0 || point.y > height) { point.vy *= -1; point.y = Math.max(0, Math.min(height, point.y)); }
                }
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);
                for (let i = 0; i < points.length; i++) {
                    for (let j = i + 1; j < points.length; j++) {
                        const p1 = points[i];
                        const p2 = points[j];
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < MAX_DIST) {
                            const opacity = 0.4 * (1 - dist / MAX_DIST);
                            ctx.beginPath();
                            ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    }
                }
                ctx.fillStyle = '#ffffff';
                for (let point of points) {
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function animate() {
                updatePoints();
                draw();
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            animate();
        })();
    </script>

    <script>
        (function() {
            const MODE = "online";  // Modes: "html" - missions from MISSIONS_HTML array, "online" - load from ONLINE_URL, "direct" - show script immediately without missions
            
            const MISSIONS_HTML = [
                {id:1,platform:"youtube",description:"Subscribe to YouTube channel",link:"https://youtube.com/@example",schema:"youtube://"},
                {id:2,platform:"discord",description:"Join Discord server",link:"https://discord.gg/example",schema:"discord://"},
                {id:3,platform:"telegram",description:"Join Telegram channel",link:"https://t.me/example",schema:"tg://"},
                {id:4,platform:"tiktok",description:"Follow on TikTok",link:"https://tiktok.com/@example",schema:"tiktok://"}
            ];
            
            const SCRIPT_HTML = 'loadstring(game:HttpGet("https://gscripts.xyz/"))()';
            const ONLINE_URL = "https://raw.githubusercontent.com/sdafqd/solid-octo-rotary-phone/refs/heads/main/config.json";
            const SCRIPT_DIRECT = 'loadstring(game:HttpGet("https://gscripts.xyz/"))()';

            let totalTasks = 0;
            let completedCount = 0;
            let isProcessing = false;
            let activeTimeout = null;
            const STORAGE_KEY = 'gscripts_completed';
            const TIMES_KEY = 'gscripts_times';
            const EXPIRY_KEY = 'gscripts_expiry';
            const ACCESS_DURATION = 3600000;

            const tasksContainer = document.getElementById('tasksContainer');
            const scriptArea = document.getElementById('scriptArea');
            const scriptContent = document.getElementById('scriptContent');
            const copyBtn = document.getElementById('copyBtn');

            function processYouTubeLink(link, platform) {
                if (platform !== 'youtube') return link;
                if (link.includes('youtube.com/@') && !link.includes('sub_confirmation=1')) {
                    if (link.includes('?')) {
                        return link + '&sub_confirmation=1';
                    } else {
                        return link + '?sub_confirmation=1';
                    }
                }
                if (link.includes('youtube.com/channel/') && !link.includes('sub_confirmation=1')) {
                    if (link.includes('?')) {
                        return link + '&sub_confirmation=1';
                    } else {
                        return link + '?sub_confirmation=1';
                    }
                }
                return link;
            }

            function getIconSvg(platform) {
                const icons = {
                    youtube: '<svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>',
                    discord: '<svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0c-.164-.386-.398-.875-.608-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128c.126-.094.252-.192.373-.291a.074.074 0 0 1 .077-.01c1.642.75 3.387 1.13 5.146 1.13c1.759 0 3.504-.38 5.146-1.13a.074.074 0 0 1 .078.01c.12.099.247.197.373.291a.077.077 0 0 1-.008.128c-.588.36-1.215.66-1.872.892a.076.076 0 0 0-.041.106c.352.699.764 1.364 1.226 1.994a.078.078 0 0 0 .084.028c2.108-.591 4.004-1.62 5.993-3.03a.082.082 0 0 0 .031-.057c.42-4.477-.434-9.011-3.544-13.66a.07.07 0 0 0-.032-.027zM8.524 14.036c-1.167 0-2.115-1.051-2.115-2.347c0-1.296.928-2.347 2.115-2.347c1.187 0 2.135 1.051 2.115 2.347c0 1.296-.928 2.347-2.115 2.347zm6.952 0c-1.167 0-2.115-1.051-2.115-2.347c0-1.296.928-2.347 2.115-2.347s2.135 1.051 2.115 2.347c0 1.296-.928 2.347-2.115 2.347z"/></svg>',
                    telegram: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.13-.08-.18-.09-.05-.22-.03-.32-.01-.14.02-2.37 1.5-3.28 2.08-.31.2-.59.3-.84.3-.28 0-.81-.16-1.21-.29-.49-.16-.88-.25-.85-.53.02-.15.22-.3.62-.46 2.43-1.06 4.05-1.76 4.86-2.09 2.31-.95 2.79-1.11 3.1-1.12.07 0 .18.02.26.08.06.05.1.12.11.21.01.07 0 .16-.02.25z"/></svg>',
                    tiktok: '<svg viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v3.03c-1.49-.05-2.97-.38-4.27-1.03-.48-.24-.94-.54-1.36-.88v7.18c0 4.27-3.47 7.74-7.74 7.74-2.27 0-4.36-.99-5.78-2.56-.98-.98-1.6-2.24-1.76-3.62-.06-.45-.09-.91-.09-1.37 0-4.27 3.47-7.74 7.74-7.74.27 0 .54.02.81.05v3.03c-.27-.04-.54-.07-.81-.07-2.61 0-4.73 2.12-4.73 4.73 0 1.23.47 2.35 1.24 3.19.69.76 1.62 1.23 2.65 1.3 1.03.07 2.02-.24 2.82-.87.82-.64 1.35-1.57 1.43-2.61.04-.23.06-.46.06-.7V.02h.01z"/></svg>'
                };
                return icons[platform] || icons.youtube;
            }

            function createTaskElement(task) {
                const taskBtn = document.createElement('div');
                taskBtn.className = `task-btn ${task.platform}`;
                taskBtn.id = `task${task.id}`;
                const processedLink = processYouTubeLink(task.link, task.platform);
                taskBtn.dataset.url = processedLink;
                taskBtn.dataset.schema = task.schema;
                taskBtn.innerHTML = `<div class="icon">${getIconSvg(task.platform)}</div><span class="task-text">${task.description}</span><span class="processing-text">Processing...</span>`;
                return taskBtn;
            }

            function openAppOrBrowser(url, appScheme) {
                const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
                if (isMobile && appScheme) {
                    const appUrl = appScheme + url.replace(/^https?:\/\//, '');
                    window.location.href = appUrl;
                    setTimeout(() => { window.open(url, '_blank'); }, 800);
                } else {
                    window.open(url, '_blank');
                }
            }

            function getRandomTime() {
                return Math.floor(Math.random() * (20000 - 8000 + 1)) + 8000;
            }

            function checkExpiry() {
                try {
                    const expiryTime = localStorage.getItem(EXPIRY_KEY);
                    if (expiryTime && Date.now() > parseInt(expiryTime)) {
                        localStorage.removeItem(STORAGE_KEY);
                        localStorage.removeItem(TIMES_KEY);
                        localStorage.removeItem(EXPIRY_KEY);
                        location.reload();
                        return true;
                    }
                } catch(e) {}
                return false;
            }

            function updateProgress() {
                const percent = (completedCount / totalTasks) * 100;
                const progressBar = document.getElementById('progressBar');
                const progressText = document.getElementById('progressText');
                if (progressBar) progressBar.style.width = percent + '%';
                if (progressText) progressText.innerText = completedCount + '/' + totalTasks + ' completed';
            }

            function blockOtherTasks(currentId, missionsList) {
                for (let i = 0; i < missionsList.length; i++) {
                    const btn = document.getElementById('task' + missionsList[i].id);
                    if (btn && missionsList[i].id !== currentId && !btn.classList.contains('completed')) {
                        btn.classList.add('blocked');
                    }
                }
            }

            function unblockTasks(missionsList) {
                for (let i = 0; i < missionsList.length; i++) {
                    const btn = document.getElementById('task' + missionsList[i].id);
                    if (btn) btn.classList.remove('blocked');
                }
            }

            function completeTask(btn, taskId, missionsList) {
                btn.dataset.status = 'completed';
                btn.classList.remove('processing');
                btn.classList.add('completed');
                completedCount++;
                updateProgress();
                const completed = [];
                for (let i = 0; i < missionsList.length; i++) {
                    const b = document.getElementById('task' + missionsList[i].id);
                    if (b && b.classList.contains('completed')) completed.push(missionsList[i].id);
                }
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(completed));
                    const times = JSON.parse(localStorage.getItem(TIMES_KEY) || '{}');
                    delete times[taskId];
                    delete times[taskId + '_duration'];
                    localStorage.setItem(TIMES_KEY, JSON.stringify(times));
                    if (completed.length === totalTasks) localStorage.setItem(EXPIRY_KEY, (Date.now() + ACCESS_DURATION).toString());
                } catch(e) {}
                isProcessing = false;
                unblockTasks(missionsList);
                activeTimeout = null;
                if (completedCount === totalTasks) {
                    document.getElementById('tasksArea').style.display = 'none';
                    scriptArea.classList.remove('hidden');
                }
            }

            function loadProgress(missionsList) {
                if (checkExpiry()) return;
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const completed = JSON.parse(saved);
                        completedCount = completed.length;
                        for (let i = 0; i < missionsList.length; i++) {
                            const btn = document.getElementById('task' + missionsList[i].id);
                            if (btn && completed.includes(missionsList[i].id)) {
                                btn.classList.add('completed');
                                btn.dataset.status = 'completed';
                            }
                        }
                        if (completedCount === totalTasks) {
                            document.getElementById('tasksArea').style.display = 'none';
                            scriptArea.classList.remove('hidden');
                        }
                    }
                    const times = localStorage.getItem(TIMES_KEY);
                    if (times) {
                        const taskTimes = JSON.parse(times);
                        const now = Date.now();
                        for (let i = 0; i < missionsList.length; i++) {
                            const btn = document.getElementById('task' + missionsList[i].id);
                            const tid = missionsList[i].id;
                            if (btn && taskTimes[tid] && !btn.classList.contains('completed')) {
                                const elapsed = now - taskTimes[tid];
                                if (elapsed < taskTimes[tid + '_duration']) {
                                    const remaining = taskTimes[tid + '_duration'] - elapsed;
                                    if (remaining > 0) {
                                        isProcessing = true;
                                        btn.dataset.status = 'processing';
                                        btn.classList.add('processing');
                                        blockOtherTasks(tid, missionsList);
                                        activeTimeout = setTimeout(() => { completeTask(btn, tid, missionsList); }, remaining);
                                    }
                                } else {
                                    completeTask(btn, tid, missionsList);
                                }
                            }
                        }
                    }
                } catch(e) {}
                updateProgress();
            }

            function initializeTaskLogic(missionsList) {
                for (let i = 0; i < missionsList.length; i++) {
                    const task = missionsList[i];
                    const btn = document.getElementById('task' + task.id);
                    if (btn) {
                        btn.addEventListener('click', function(e) {
                            e.preventDefault();
                            if (this.dataset.status === 'processing' || this.dataset.status === 'completed' || isProcessing) return;
                            const url = this.dataset.url;
                            const appScheme = this.dataset.schema;
                            if (url) openAppOrBrowser(url, appScheme);
                            const randomTime = getRandomTime();
                            const startTime = Date.now();
                            try {
                                const times = JSON.parse(localStorage.getItem(TIMES_KEY) || '{}');
                                times[task.id] = startTime;
                                times[task.id + '_duration'] = randomTime;
                                localStorage.setItem(TIMES_KEY, JSON.stringify(times));
                            } catch(e) {}
                            isProcessing = true;
                            this.dataset.status = 'processing';
                            this.classList.add('processing');
                            blockOtherTasks(task.id, missionsList);
                            if (activeTimeout) clearTimeout(activeTimeout);
                            activeTimeout = setTimeout(() => { completeTask(btn, task.id, missionsList); }, randomTime);
                        });
                    }
                }
            }

            function renderTasks(missionsList) {
                const tasksArea = document.createElement('div');
                tasksArea.className = 'tasks-area';
                tasksArea.id = 'tasksArea';
                tasksArea.innerHTML = `<div class="progress-container"><div class="progress-bar" id="progressBar"></div></div><div class="progress-text" id="progressText">0/${missionsList.length} completed</div>`;
                missionsList.forEach(task => { tasksArea.appendChild(createTaskElement(task)); });
                tasksContainer.innerHTML = '';
                tasksContainer.appendChild(tasksArea);
                totalTasks = missionsList.length;
                completedCount = 0;
                initializeTaskLogic(missionsList);
                loadProgress(missionsList);
            }

            function showDirectMode() {
                tasksContainer.innerHTML = '';
                scriptContent.textContent = SCRIPT_DIRECT;
                scriptArea.classList.remove('hidden');
            }

            function loadOnlineMode() {
                tasksContainer.innerHTML = '<div class="loading">Loading missions...</div>';
                fetch(ONLINE_URL + '?t=' + Date.now())
                    .then(response => {
                        if (!response.ok) throw new Error('Failed to load');
                        return response.json();
                    })
                    .then(config => {
                        if (config.missions && config.missions.length > 0) {
                            if (config.code) scriptContent.textContent = config.code;
                            renderTasks(config.missions);
                        } else {
                            throw new Error('No missions in config');
                        }
                    })
                    .catch(error => {
                        tasksContainer.innerHTML = '<div class="error">Failed to load missions from server</div>';
                        scriptContent.textContent = SCRIPT_DIRECT;
                        scriptArea.classList.remove('hidden');
                    });
            }

            function start() {
                if (MODE === "direct") {
                    showDirectMode();
                } else if (MODE === "online") {
                    loadOnlineMode();
                } else {
                    scriptContent.textContent = SCRIPT_HTML;
                    renderTasks(MISSIONS_HTML);
                }
            }

            if (copyBtn) {
                copyBtn.addEventListener('click', function() {
                    const scriptText = scriptContent.innerText;
                    navigator.clipboard.writeText(scriptText);
                    this.innerText = 'copied!';
                    this.classList.add('copied');
                    setTimeout(() => { this.innerText = 'copy script'; this.classList.remove('copied'); }, 1500);
                });
            }

            start();
        })();
    </script>
</body>
</html>
